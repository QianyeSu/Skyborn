[run]
source =
    src/skyborn/plot
omit =
    */tests/*
    */build/*
    */site-packages/*
    */skyborn/plot/plotting.py
    */skyborn/plot/__init__.py
    */skyborn/plot/nclcurly_native/*

[report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod
    def _[A-Za-z0-9_]+\(.*\):
    class _[A-Za-z0-9_]+\(.*\):
    class _[A-Za-z0-9_]+:

[html]
directory = htmlcov

[xml]
output = coverage.xml

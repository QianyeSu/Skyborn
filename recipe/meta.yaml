{% set name = "skyborn" %}
{% set version = "0.3.22" %}
{% set commit = "c5f9e0f9bf87b1139335d4eb0a987e412c9607af" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/QianyeSu/Skyborn/archive/{{ commit }}.tar.gz
  sha256: 7ac26f07bceca32ec25863e70b26011046339eb6c7069a90197179523f0b2f51

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('fortran') }}
  host:
    - python
    - pip
    - setuptools >=61
    - wheel
    - numpy >=1.24
    - cython >=3
    - meson
    - ninja
    - libgomp  # [linux]
    - libgomp  # [win]
    - llvm-openmp  # [osx]
  run:
    - python
    - numpy
    - pandas
    - xarray
    - matplotlib-base
    - netcdf4
    - metpy
    - tqdm
    - statsmodels
    - scipy
    - scikit-learn
    - dask

test:
  requires:
    - pip
  imports:
    - skyborn
    - skyborn.calc
    - skyborn.interp
    - skyborn.spharm
  commands:
    - python -c "import skyborn.spharm._spherepack; import skyborn.calc.geostrophic.geostrophicwind; import skyborn.calc.troposphere.tropopause_height; import skyborn.calc.growth_rate.growth_rate_kernels; import skyborn.calc.GPI.tropical_cyclone_potential_intensity; import skyborn.calc.mann_kendall.mann_kendall_core"
    - pip check

about:
  home: https://github.com/QianyeSu/Skyborn
  dev_url: https://github.com/QianyeSu/Skyborn
  doc_url: https://skyborn.readthedocs.io/
  summary: Atmospheric science research utilities
  description: |
    Skyborn is an atmospheric science research utilities package with Python,
    Fortran, and Cython components for interpolation, spherical harmonics,
    trend analysis, and related meteorological workflows.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - QianyeSu

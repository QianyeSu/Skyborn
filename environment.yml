name: skyborn
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.9
  - numpy>=1.23  # Required for f2py without distutils
  - xarray
  - matplotlib
  - seaborn
  - pytest
  - pytest-cov
  - eccodes # For GRIB processing
  - gfortran_linux-64  # For Fortran compilation
  - meson>=0.64
  - ninja
  - pip
